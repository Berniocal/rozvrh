<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Rozvrh</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: linear-gradient(135deg,#a8b9d6,#d6e0f0);
  color: #2c3e50;
  font-size: 22px;
}

/* DARK MODE */
.dark {
  background: #1e1e1e !important;
  color: #eee;
}
.dark .container { background:#2c2c2c; }
.dark @media (min-width: 900px){
  .container{
    transform: scale(0.9);
    transform-origin: top center;
  }
}

.dark table { background:#2c2c2c; }
.dark th { background:#444; color:#fff; }
.dark td { background:#3a3a3a; color:#fff; }

.container {
  background: white;
  margin: 40px auto;
  padding: 20px;
  border-radius: 16px;
  width: 95%;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

@media (min-width: 900px){
  .container{
    transform: scale(0.9);
    transform-origin: top center;
  }
}

table {
  background: white;
  border-collapse: collapse;
  margin: 20px auto;
  width: 100%;
}

td, th {
  border: 1px dashed #b0c4de;
  height: 100px;
  width: 140px;
  padding: 10px;
  font-size: 20px;
  border-radius: 8px;
  overflow: hidden;
  word-wrap: break-word;
  word-break: break-word;
}

/* 🔑 KLÍČOVÁ ÚPRAVA */
td {
  padding: 0;
  overflow: hidden;
  position: relative;
}

th { background: #d6e0f0; }

td {
  background: #f9fbff;
  cursor: pointer;
}

td:hover { background: #e6efff; }

td.active { outline: 3px solid #5a7bd8; }

td.gyby { background:#cfe8cc; }
td.zs { background:#e8caca; }
.dark td.gyby { background:#2e5a2e; }
.dark td.zs { background:#5a2e2e; }

.top-right {
  position: absolute;
  z-index: 9999;
  top: 10px;
  right: 10px;
}

button {
  padding: 10px 14px;
  margin: 3px;
  cursor: pointer;
  border-radius: 8px;
  border: none;
  background: #7da2f2;
  color: white;
  font-size: 16px;
}

.controls { margin: 10px; }

#formBox {
  background: white;
  border-radius: 16px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}
.dark #formBox { background:#2c2c2c; }

/* 🔑 WRAPPER */
.cell-content {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;

  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;

  overflow: hidden;
  text-align: center;
  padding: 6px;
  box-sizing: border-box;
  line-height: 1.1;

  word-break: break-word;
  overflow-wrap: anywhere;
}
</style>

</head>
<body>

<div class="top-right">
  <button onclick="toggleAdmin()">Admin</button>
  <button onclick="toggleDark()">🌙</button>
</div>

<div class="container">

<h2>Rozvrh</h2>

<div class="controls">
  <button onclick="changeWeek(-1)">⬅️</button>
  <span id="weekLabel"></span>
  <button onclick="changeWeek(1)">➡️</button>
</div>

<table id="table"></table>

</div>

<div id="formBox" style="display:none; position:fixed; top:30%; left:50%; transform:translate(-50%,-50%); padding:20px;">
  <select id="school">
    <option>GYBY</option>
    <option>ZŠ Vejrostova</option>
  </select><br><br>
  <input id="teacher" placeholder="Učitel"><br><br>
  <input id="class" placeholder="Třída"><br><br>
  <button onclick="saveData()">Uložit</button>
  <button onclick="cancelEdit()">Zrušit</button>
  <button id="deleteBtn" onclick="deleteData()" style="display:none;">Smazat</button>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyCWCXir_hVT7E8Macjd9KPTMLNmCOfHalI",
  authDomain: "rozvrh-35bdc.firebaseapp.com",
  databaseURL: "https://rozvrh-35bdc-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "rozvrh-35bdc"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

function getWeekNumber() {
  const d = new Date();
  d.setHours(0,0,0,0);
  d.setDate(d.getDate() + 3 - (d.getDay() + 6) % 7);
  const week1 = new Date(d.getFullYear(),0,4);
  return 1 + Math.round(((d - week1) / 86400000 - 3 + (week1.getDay() + 6) % 7) / 7);
}

function getWeekDates() {
  let today = new Date();
  let monday = new Date(today);
  monday.setDate(today.getDate() - today.getDay() + 1 + (week - getWeekNumber()) * 7);

  let result = [];
  for (let i = 0; i < 5; i++) {
    let d = new Date(monday);
    d.setDate(monday.getDate() + i);
    result.push(d.getDate() + "." + (d.getMonth()+1) + ".");
  }
  return result;
}

let week = getWeekNumber();
let admin = false;
let selected = null;
let dialogOpen = false;

const days = ["Po","Út","St","Čt","Pá"];

const hours = [
  {name:"0",time:"7:05-7:50"},
  {name:"1",time:"8:00-8:45"},
  {name:"2",time:"8:55-9:40"},
  {name:"3",time:"10:00-10:45"},
  {name:"4",time:"10:55-11:40"},
  {name:"5a",time:"11:50-12:35"},
  {name:"5b",time:"12:20-13:05"},
  {name:"6",time:"13:15-14:00"},
  {name:"7",time:"14:10-14:55"},
  {name:"8",time:"15:05-15:50"}
];

function renderTable(){
  const t=document.getElementById("table");
  t.innerHTML="";

  const dates = getWeekDates();

  let h="<tr><th></th>";
  hours.forEach(x=>h+=`<th style="font-size:18px">${x.name}<br><small style="font-size:14px">${x.time}</small></th>`);
  h+="</tr>";
  t.innerHTML+=h;

  days.forEach((d,di)=>{
    let r=`<tr><th>${d}<br><small>${dates[di]}</small></th>`;
    hours.forEach((_,hi)=>{
      r+=`<td id="c-${di}-${hi}" onclick="cellClick(${di},${hi})"></td>`;
    });
    r+="</tr>";
    t.innerHTML+=r;
  });

  loadData();
  setTimeout(autoResizeText,50);
}

function cellClick(d,h){
  if(dialogOpen) return;

  const ref=db.ref(`weeks/${week}/${d}/${h}`);
  ref.once("value").then(s=>{
    const data=s.val();
    if(data && !admin){
      alert("Obsazeno");
      return;
    }

    selected={d,h};
    dialogOpen=true;

    document.querySelectorAll("td").forEach(td=>td.classList.remove("active"));
    document.getElementById(`c-${d}-${h}`).classList.add("active");

    document.getElementById("formBox").style.display="block";
    document.getElementById("deleteBtn").style.display=(admin && data)?"inline":"none";
  });
}

function saveData(){

  const ref = db.ref(`weeks/${week}/${selected.d}/${selected.h}`);

  ref.once("value").then(snapshot => {
    const existing = snapshot.val();

    if(existing && !admin){
      alert("❗ Termín byl mezitím obsazen někým jiným.");
      closeForm();
      return;
    }

    const s = document.getElementById("school").value;
    const t = document.getElementById("teacher").value;
    const c = document.getElementById("class").value;

    let data = {s,t,c};

    if(admin){
      data.adminKey = "1234";
    }

    ref.set(data);
    closeForm();
  });
}

function deleteData(){
  if(admin){
    db.ref(`weeks/${week}/${selected.d}/${selected.h}`).set({
      deleted: true,
      adminKey: "TAJNE_HESLO"
    });
  }
  closeForm();
}

function cancelEdit(){
  closeForm();
}

function closeForm(){
  dialogOpen=false;
  document.getElementById("formBox").style.display="none";
  document.querySelectorAll("td").forEach(td=>td.classList.remove("active"));
}

function loadData(){
  db.ref(`weeks/${week}`).on("value",snap=>{
    const data=snap.val()||{};
    days.forEach((_,d)=>{
      hours.forEach((_,h)=>{
        const cell=document.getElementById(`c-${d}-${h}`);
        const val=data?.[d]?.[h];

        cell.classList.remove("gyby","zs");

        if(val){
          if(val.s==="GYBY") cell.classList.add("gyby");
          if(val.s==="ZŠ Vejrostova") cell.classList.add("zs");

          let schoolText = val.s === "ZŠ Vejrostova" ? "ZŠ<br>Vejrostova" : val.s;
cell.innerHTML=`<div class="cell-content">
<b >${schoolText}</b><br>
<span >${val.t}</span><br>
<span >${val.c}</span>
</div>`;
        } else {
          cell.innerHTML="";
        }
      });
    });
    setTimeout(autoResizeText,50);
  });
}

function changeWeek(x){
  week+=x;
  document.getElementById("weekLabel").innerText="Týden: "+week;
  renderTable();
}

function toggleAdmin(){
  if(prompt("Heslo:")==="1234") admin=true;
}

function toggleDark(){
  document.body.classList.toggle("dark");
}

function autoResizeText(){
  document.querySelectorAll(".cell-content").forEach(el=>{
    let parent = el.parentElement;

    let size = 22;
    el.style.fontSize = size + "px";

    while(
      (el.scrollHeight > parent.clientHeight || 
       el.scrollWidth > parent.clientWidth) && size > 8
    ){
      size -= 1;
      el.style.fontSize = size + "px";
    }
  });
}

document.getElementById("weekLabel").innerText="Týden: "+week;
renderTable();

</script>

</body>
</html>

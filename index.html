<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Rozvrh</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #f5f5f5;
}

h2 {
  margin-top: 20px;
}

table {
  border-collapse: collapse;
  margin: 20px auto;
  background: white;
}

td, th {
  border: 1px solid #ccc;
  width: 120px;
  height: 70px;
  cursor: pointer;
  vertical-align: top;
  padding: 5px;
  font-size: 12px;
}

td:hover {
  background: #eef;
}

th {
  background: #ddd;
}

.controls {
  margin: 10px;
}

button {
  padding: 8px 12px;
  font-size: 16px;
  cursor: pointer;
}
</style>

</head>
<body>

<h2>Rozvrh</h2>

<div class="controls">
  <button onclick="changeWeek(-1)">⬅️</button>
  <span id="weekLabel">Týden: 0</span>
  <button onclick="changeWeek(1)">➡️</button>
</div>

<table id="table"></table>

<div class="controls">
  <button onclick="changeWeek(-1)">⬅️</button>
  <button onclick="changeWeek(1)">➡️</button>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyCWCXir_hVT7E8Macjd9KPTMLNmCOfHalI",
  authDomain: "rozvrh-35bdc.firebaseapp.com",
  databaseURL: "https://rozvrh-35bdc-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "rozvrh-35bdc"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let week = 0;

const days = ["Po", "Út", "St", "Čt", "Pá"];

const hours = [
  {name:"0", time:"7:05-7:50"},
  {name:"1", time:"8:00-8:45"},
  {name:"2", time:"8:55-9:40"},
  {name:"3", time:"10:00-10:45"},
  {name:"4", time:"10:55-11:40"},
  {name:"5a", time:"11:50-12:35"},
  {name:"5b", time:"12:20-13:05"},
  {name:"6", time:"13:15-14:00"},
  {name:"7", time:"14:10-14:55"},
  {name:"8", time:"15:05-15:50"}
];

function getWeekDates() {
  let today = new Date();
  let monday = new Date(today);
  monday.setDate(today.getDate() - today.getDay() + 1 + week * 7);

  let result = [];
  for (let i = 0; i < 5; i++) {
    let d = new Date(monday);
    d.setDate(monday.getDate() + i);
    result.push(d.getDate() + "." + (d.getMonth()+1) + ".");
  }
  return result;
}

function renderTable() {
  const table = document.getElementById("table");
  table.innerHTML = "";

  const dates = getWeekDates();

  let header = "<tr><th></th>";
  hours.forEach(h => {
    header += `<th>${h.name}<br><small>${h.time}</small></th>`;
  });
  header += "</tr>";
  table.innerHTML += header;

  days.forEach((day, d) => {
    let row = `<tr><th>${day}<br><small>${dates[d]}</small></th>`;
    hours.forEach((h, i) => {
      row += `<td onclick="editCell(${d},${i})" id="cell-${d}-${i}"></td>`;
    });
    row += "</tr>";
    table.innerHTML += row;
  });

  loadData();
}

function editCell(d, h) {
  let text = prompt("Zadej: škola, učitel, třída");
  if (!text) return;

  db.ref(`weeks/${week}/${d}/${h}`).set(text);
}

function loadData() {
  db.ref(`weeks/${week}`).on("value", snapshot => {
    const data = snapshot.val() || {};

    days.forEach((_, d) => {
      hours.forEach((_, h) => {
        const cell = document.getElementById(`cell-${d}-${h}`);
        if (cell) {
          cell.innerText = data?.[d]?.[h] || "";
        }
      });
    });
  });
}

function changeWeek(delta) {
  week += delta;
  document.getElementById("weekLabel").innerText = "Týden: " + week;
  renderTable();
}

renderTable();

</script>

</body>
</html>

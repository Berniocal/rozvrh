<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Rozvrh</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #f5f5f5;
}

h2 {
  margin-top: 20px;
}

table {
  border-collapse: collapse;
  margin: 20px auto;
  background: white;
}

td, th {
  border: 1px solid #ccc;
  width: 120px;
  height: 70px;
  cursor: pointer;
  vertical-align: top;
  padding: 5px;
  font-size: 12px;
}

td:hover {
  background: #eef;
}

th {
  background: #ddd;
}

.controls {
  margin: 10px;
}

button {
  padding: 8px 12px;
  font-size: 16px;
  cursor: pointer;
}
</style>

</head>
<body>

<h2>Rozvrh</h2>

<div class="controls">
  <button onclick="changeWeek(-1)">⬅️</button>
  <span id="weekLabel">Týden: 0</span>
  <button onclick="changeWeek(1)">➡️</button>
</div>

<table id="table"></table>

<div class="controls">
  <button onclick="changeWeek(-1)">⬅️</button>
  <button onclick="changeWeek(1)">➡️</button>
</div>

<!-- Firebase v8 (DŮLEŽITÉ!) -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

// 🔥 SEM VLOŽ SVŮJ FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyCWCXir_hVT7E8Macjd9KPTMLNmCOfHalI",
  authDomain: "rozvrh-35bdc.firebaseapp.com",
  databaseURL: "https://rozvrh-35bdc-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "rozvrh-35bdc"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// MUSÍ BÝT NAHOŘE
let week = 0;

const days = ["Po", "Út", "St", "Čt", "Pá"];
const hours = ["0","1","2","3","4","5a","5b","6","7","8"];

// VYKRESLENÍ TABULKY
function renderTable() {
  const table = document.getElementById("table");
  table.innerHTML = "";

  let header = "<tr><th></th>";
  hours.forEach(h => header += `<th>${h}</th>`);
  header += "</tr>";
  table.innerHTML += header;

  days.forEach((day, d) => {
    let row = `<tr><th>${day}</th>`;
    hours.forEach((h, i) => {
      row += `<td onclick="editCell(${d},${i})" id="cell-${d}-${i}"></td>`;
    });
    row += "</tr>";
    table.innerHTML += row;
  });

  loadData();
}

// EDITACE BUŇKY
function editCell(d, h) {
  let text = prompt("Zadej: škola, učitel, třída");
  if (!text) return;

  db.ref(`weeks/${week}/${d}/${h}`).set(text);
}

// NAČTENÍ DAT
function loadData() {
  db.ref(`weeks/${week}`).on("value", snapshot => {
    const data = snapshot.val() || {};

    days.forEach((_, d) => {
      hours.forEach((_, h) => {
        const cell = document.getElementById(`cell-${d}-${h}`);
        cell.innerText = data?.[d]?.[h] || "";
      });
    });
  });
}

// PŘEPÍNÁNÍ TÝDNŮ
function changeWeek(delta) {
  week += delta;
  document.getElementById("weekLabel").innerText = "Týden: " + week;
  renderTable();
}

// START
renderTable();

</script>

</body>
</html>
